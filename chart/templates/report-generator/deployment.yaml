apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "temp-poc.fullname" . }}-report-generator
  labels:
    {{- include "temp-poc.labels" . | nindent 4 }}
    app.kubernetes.io/component: report-generator
spec:
  replicas: {{ .Values.reportGenerator.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "temp-poc.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: report-generator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "temp-poc.name" . }}
        app.kubernetes.io/instance: {{ .Release.Name }}
        app.kubernetes.io/component: report-generator
        scalex.io/release: {{ .Release.Name }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        {{- include "temp-poc.podSecurityContext" . | nindent 8 }}
      containers:
        - name: report-generator
          image: {{ include "temp-poc.image" .Values.images.reportGenerator | quote }}
          imagePullPolicy: {{ .Values.images.reportGenerator.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
          resources:
            {{- toYaml .Values.reportGenerator.resources | nindent 12 }}
          securityContext:
            {{- include "temp-poc.containerSecurityContext" . | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
