name: Build images and update chart values

on:
  push:
    branches:
      - main
    paths-ignore:
      - chart/values.yaml
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: temp-poc-images-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_REGISTRY: docker.io/belltigerlee
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69

jobs:
  build-and-record:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    timeout-minutes: 45
    steps:
      - name: Check out exact child source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: true

      - name: Install pinned uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: false
          version: 0.11.16

      - name: Install checksum-verified yq
        shell: bash
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/scalex-tools"
          mkdir -p "$tools"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            --output "$tools/yq"
          printf '%s  %s\n' "$YQ_SHA256" "$tools/yq" | sha256sum --check --strict
          chmod 0755 "$tools/yq"
          printf '%s\n' "$tools" >> "$GITHUB_PATH"

      - name: Validate child source and chart
        shell: bash
        run: ./scripts/test.sh

      - name: Authenticate to Docker Hub
        shell: bash
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
        run: |
          set -euo pipefail
          set +x
          printf '%s' "$DOCKERHUB_TOKEN" | docker login docker.io \
            --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Build and push exact-SHA images
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-images.sh --push "$GITHUB_SHA"

      - name: Resolve immutable registry digests
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/create-promotion-payload.sh "$RUNNER_TEMP/promotion.json" "$GITHUB_SHA"
          jq -e '.images | length == 3' "$RUNNER_TEMP/promotion.json" >/dev/null

      - name: Record built images in chart values
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/apply-image-metadata.sh "$RUNNER_TEMP/promotion.json"
          helm lint --strict chart
          helm template temp-poc chart --namespace scalex-temp-poc \
            > "$RUNNER_TEMP/rendered.yaml"
          ./scripts/validate-render.sh "$RUNNER_TEMP/rendered.yaml"

      - name: Commit chart values to this repository
        shell: bash
        run: |
          set -euo pipefail
          if git diff --quiet -- chart/values.yaml; then
            echo "Chart values already contain this image metadata"
            exit 0
          fi

          remote_sha="$(git ls-remote --heads origin "refs/heads/$GITHUB_REF_NAME" | awk '{print $1}')"
          if [ "$remote_sha" != "$GITHUB_SHA" ]; then
            echo "A newer source commit exists; its workflow will update chart values"
            exit 0
          fi

          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add chart/values.yaml
          git commit -m "chore(images): record ${GITHUB_SHA:0:12} [skip ci]"
          git push origin "HEAD:refs/heads/$GITHUB_REF_NAME"
