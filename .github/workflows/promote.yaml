name: Publish verified promotion artifact

on:
  push:
    branches:
      - main
    paths-ignore:
      - chart/values.yaml
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: temp-poc-promotion-latest-verified
  cancel-in-progress: false

env:
  # IMAGE_REGISTRY: docker.io/belltigerlee
  IMAGE_REGISTRY: 10.34.25.18/playerone
  PROMOTION_REPOSITORY: 10.34.25.18/playerone/temp-poc-promotions
  HARBOR_PLAIN_HTTP: "true"
  YQ_VERSION: v4.45.4
  YQ_SHA256: b96de04645707e14a12f52c37e6266832e03c29e95b9b139cddcae7314466e69

jobs:
  publish-verified-promotion:
    name: Publish verified promotion
    if: github.ref == 'refs/heads/main'
    # runs-on: ubuntu-24.04
    runs-on:
      - self-hosted
      - linux
      - x64
      - work8
    timeout-minutes: 45
    steps:
      - name: Check out exact child source
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install pinned uv
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e
        with:
          enable-cache: false
          version: 0.11.16

      - name: Install checksum-verified yq
        shell: bash
        run: |
          set -euo pipefail
          tools="$RUNNER_TEMP/scalex-tools"
          mkdir -p "$tools"
          curl --proto '=https' --tlsv1.2 --fail --silent --show-error --location \
            "https://github.com/mikefarah/yq/releases/download/${YQ_VERSION}/yq_linux_amd64" \
            --output "$tools/yq"
          printf '%s  %s\n' "$YQ_SHA256" "$tools/yq" | sha256sum --check --strict
          chmod 0755 "$tools/yq"
          printf '%s\n' "$tools" >> "$GITHUB_PATH"

      - name: Validate child source and chart
        shell: bash
        run: ./scripts/test.sh

      - name: Install pinned ORAS
        uses: oras-project/setup-oras@1d808f7d7f6995cc68b7bf507bfe5c5446e1dc9d
        with:
          version: 1.3.3

      - name: Assert ORAS version
        shell: bash
        run: |
          set -euo pipefail
          oras version | grep -Eq '(^|[^0-9])1\.3\.3([^0-9]|$)'

      - name: Prepare isolated registry authentication
        shell: bash
        run: |
          set -euo pipefail
          set +x
          auth_root="$RUNNER_TEMP/temp-poc-auth"
          rm -rf "$auth_root"
          install -d -m 0700 "$auth_root" "$auth_root/docker" "$auth_root/oras"
          printf '{}\n' > "$auth_root/docker/config.json"
          chmod 0600 "$auth_root/docker/config.json"
          printf 'DOCKER_CONFIG=%s\n' "$auth_root/docker" >> "$GITHUB_ENV"
          printf 'TMPDIR=%s\n' "$auth_root/oras" >> "$GITHUB_ENV"

      # - name: Authenticate to Docker Hub
      #   shell: bash
      #   env:
      #     DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      #     DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
      #   run: |
      #     set -euo pipefail
      #     set +x
      #     printf '%s' "$DOCKERHUB_TOKEN" | docker login docker.io \
      #       --username "$DOCKERHUB_USERNAME" --password-stdin

      - name: Authenticate to Harbor
        shell: bash
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          set +x
          : "${HARBOR_USERNAME:?HARBOR_USERNAME secret is missing}"
          : "${HARBOR_PASSWORD:?HARBOR_PASSWORD secret is missing}"
          printf '%s' "$HARBOR_PASSWORD" | docker login 10.34.25.18 \
            --username "$HARBOR_USERNAME" --password-stdin

      - name: Build and push exact-SHA images
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/build-images.sh --push --latest "$GITHUB_SHA"

      - name: Resolve immutable registry digests
        shell: bash
        run: |
          set -euo pipefail
          ./scripts/create-promotion-payload.sh "$RUNNER_TEMP/promotion.json" "$GITHUB_SHA"
          discovered_count="$(./scripts/discover-images.sh | wc -l | tr -d ' ')"
          jq -e --argjson count "$discovered_count" '.images | length == $count' \
            "$RUNNER_TEMP/promotion.json" >/dev/null

      - name: Publish verified promotion
        shell: bash
        env:
          HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
          HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
        run: |
          set -euo pipefail
          set +x
          trap 'rm -rf "$RUNNER_TEMP/temp-poc-auth/oras"' EXIT INT TERM
          ./scripts/publish-promotion-artifact.sh "$RUNNER_TEMP/promotion.json" "$GITHUB_SHA"

      - name: Clean registry authentication
        if: always()
        shell: bash
        run: |
          set -euo pipefail
          set +x
          if [ -d "$RUNNER_TEMP/temp-poc-auth/docker" ]; then
            docker logout 10.34.25.18 >/dev/null 2>&1 || true
          fi
          rm -rf "$RUNNER_TEMP/temp-poc-auth"
