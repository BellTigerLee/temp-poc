apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "dataset-ingest.fullname" . }}
  labels:
    {{- include "dataset-ingest.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ .Chart.Name }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        {{- include "dataset-ingest.labels" . | nindent 8 }}
    spec:
      containers:
        - name: dataset-ingest
          image: "{{ .Values.image.repository }}@{{ .Values.image.digest }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.service.port }}
          env:
            - name: FEATURE_CONFIG
              valueFrom:
                configMapKeyRef:
                  name: {{ include "dataset-ingest.fullname" . }}-config
                  key: FEATURE
            {{- if and .Values.existingSecret.name .Values.existingSecret.key }}
            - name: RUNTIME_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret.name | quote }}
                  key: {{ .Values.existingSecret.key | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
