apiVersion: v1
kind: Service
metadata:
  name: {{ include "dataset-ingest.fullname" . }}
  labels:
    {{- include "dataset-ingest.labels" . | nindent 4 }}
spec:
  selector:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
